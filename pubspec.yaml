name: tds_monitor
description: TDS water quality monitor for ESP32 sensor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests to ESP32
  http: ^1.2.1

  # Charting
  fl_chart: ^0.68.0

  # CSV file writing
  csv: ^6.0.0

  # File system paths (Documents, Downloads, etc.)
  path_provider: ^2.1.3

  # Let user pick a save folder
  file_picker: ^8.0.3

  # Share/open files from the app
  share_plus: ^9.0.0

  # Persist settings (theme, save path, poll interval)
  shared_preferences: ^2.3.0

  # Permissions for Android external storage
  permission_handler: ^11.3.1

  # Intl for timestamp formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true